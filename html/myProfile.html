<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1> 안녕하세요! 저를 소개합니다.</h1>
    <p>아래는 제가 좋아하는 것들과 올해의 계획, 그리고 저를 표현하는 단어들입니다.</p>
    <div>
        <h2>내가 좋아하는 음식</h2>
        <ol>
            <li>삼겹살</li>
            <li>치킨</li>
            <li>피자</li>
        </ol>

        <hr>

        <h2>올해의 계획</h2>
        <ul>
            <li>취업하기</li>
            <li>운동하기</li>
            <li>여행가기</li>
        </ul>

        <hr>

        <h2>나를 표현하는 단어</h2>
        <dl>
            <dt>긍정적</dt>
            <dd>항상 밝고 긍정적인 마인드를 가지고 있습니다.</dd>
            <dt>창의적</dt>
            <dd>새로운 아이디어를 생각해내는 것을 좋아합니다.</dd>
            <dt>책임감</dt>
            <dd>맡은 일에 대해 끝까지 책임을 지는 성격입니다.</dd>
        </dl>
    </div>
</body>
</html>
